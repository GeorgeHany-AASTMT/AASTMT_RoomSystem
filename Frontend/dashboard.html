<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Dashboard | AASTMT Academic Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000a1e", "primary-container": "#002147", "secondary": "#735c00", "secondary-fixed": "#ffe088", "surface": "#f8f9fa",
                        "on-surface": "#191c1d", "surface-container-highest": "#e1e3e4", "error": "#ba1a1a"
                    },
                    fontFamily: {
                        headline: ["Manrope"], body: ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen">
<nav class="bg-primary-container text-white py-4 px-8 shadow-lg flex justify-between items-center">
    <div class="flex items-center gap-4">
        <img alt="AASTMT Logo" class="h-10 w-10 object-contain rounded bg-white p-1" src="https://upload.wikimedia.org/wikipedia/commons/d/da/AASTMT_Logo.png">
        <h1 class="font-headline font-bold text-xl tracking-wide">AASTMT Portal Dashboard</h1>
    </div>
    <div class="flex items-center gap-4">
        <span id="userName" class="font-medium text-sm">Loading...</span>
        <button id="logoutBtn" class="text-sm font-bold bg-secondary-fixed text-primary px-4 py-2 rounded-lg hover:bg-secondary hover:text-white transition-all">Logout</button>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-8 mt-6">
    <!-- Quick Stats -->


    <!-- Booking Form Section Placeholder -->
    <section class="bg-white p-8 rounded-xl border border-surface-container-highest shadow-sm">
        <h2 class="font-headline text-2xl font-bold mb-4">Request a Room</h2>
        <p class="text-gray-600 mb-6 font-medium">Select the room type you need below. Availability constraints apply based on your role.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-gray-300 rounded-xl hover:border-primary hover:bg-blue-50 transition-all group">
                <span class="material-symbols-outlined text-4xl text-gray-400 group-hover:text-primary mb-3">meeting_room</span>
                <span class="font-bold text-lg text-gray-700 group-hover:text-primary">Lecture Room</span>
                <span class="text-sm text-gray-500 mt-2">Max 24h advance request limit</span>
            </button>
            <button class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-gray-300 rounded-xl hover:border-secondary hover:bg-yellow-50 transition-all group">
                <span class="material-symbols-outlined text-4xl text-gray-400 group-hover:text-secondary mb-3">celebration</span>
                <span class="font-bold text-lg text-gray-700 group-hover:text-secondary">Multi-Purpose Room</span>
                <span class="text-sm text-gray-500 mt-2">Requires Branch Manager approval</span>
            </button>
        </div>
    </section>
    <!-- My Recent Bookings -->
    <section class="mt-8 bg-white p-8 rounded-xl border border-surface-container-highest shadow-sm">
        <h2 class="font-headline text-2xl font-bold mb-4">My Recent Bookings</h2>
        <div class="overflow-x-auto rounded-lg border border-gray-200">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-700 text-sm font-bold uppercase">
                        <th class="p-4 border-b">Room</th>
                        <th class="p-4 border-b">Title</th>
                        <th class="p-4 border-b">Time Slot</th>
                        <th class="p-4 border-b">Status</th>
                    </tr>
                </thead>
                <tbody id="myBookingsTable" class="text-sm">
                    <tr><td colspan="4" class="p-4 text-center text-gray-500 italic">No bookings found.</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<!-- Module script for Dashboard RBAC Routing -->
<script type="module" src="js/dashboard.js"></script>
</body>
</html>
